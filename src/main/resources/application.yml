spring:
  application:
    name: starsoft-api

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:starsoft_db}
    username: ${DB_USER:starsoft_user}
    password: ${DB_PASSWORD:starsoft_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6380}

  cache:
    type: redis
    redis:
      time-to-live: 3600000

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never

logging:
  file:
    name: logs/starsoft-api.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30

jwt:
  secret: ${JWT_SECRET:dev-only-change-me-in-prod-min-32-bytes-required-for-hs256-signing}
  expiration: ${JWT_EXPIRATION:900000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  upload:
    dir: ${UPLOAD_DIR:images}
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:changeme-on-first-run}
    email: ${ADMIN_EMAIL:sarxanbabayevcontact@gmail.com}
    full-name: ${ADMIN_FULL_NAME:StarSoft Admin}
  ratelimit:
    contact-per-hour: ${RATELIMIT_CONTACT_PER_HOUR:5}
    login-per-minute: ${RATELIMIT_LOGIN_PER_MINUTE:10}
  mail:
    from: ${MAIL_FROM:${MAIL_USERNAME:}}
    from-name: ${MAIL_FROM_NAME:StarSoft}
    notify-to: ${MAIL_NOTIFY_TO:sarxanbabayevcontact@gmail.com}
    enabled: ${MAIL_ENABLED:true}
